<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-body p-4">
          <h3 class="text-center mb-4">📝 Create an Account</h3>
          <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
          <div class="alert alert-success" *ngIf="success">{{ success }}</div>
          <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input
                type="text"
                class="form-control"
                formControlName="fullName"
                [class.is-invalid]="
                  registerForm.get('fullName')?.invalid && registerForm.get('fullName')?.touched
                "
              />
              <div class="invalid-feedback">Name must be at least 3 characters.</div>
            </div>
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <input
                type="email"
                class="form-control"
                formControlName="email"
                [class.is-invalid]="
                  registerForm.get('email')?.invalid && registerForm.get('email')?.touched
                "
              />
              <div class="invalid-feedback">Enter a valid email.</div>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                formControlName="passwordHash"
                [class.is-invalid]="
                  registerForm.get('passwordHash')?.invalid &&
                  registerForm.get('passwordHash')?.touched
                "
              />
              <div class="invalid-feedback">Password must be at least 5 characters.</div>
            </div>
            <button type="submit" class="btn btn-dark w-100" [disabled]="loading">
              {{ loading ? 'Creating Account...' : 'Register' }}
            </button>
          </form>
          <p class="text-center mt-3">
            Already have an account?
            <a routerLink="/login">Login here</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
