<div class="container mt-4">
  <h2>👥 Manage Users</h2>
  <div class="alert alert-success" *ngIf="message">{{ message }}</div>
  <table class="table table-hover shadow">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Full Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.userId }}</td>
        <td>{{ user.fullName }}</td>
        <td>{{ user.email }}</td>
        <td>
          <span
            class="badge"
            [class.bg-danger]="user.role === 'Admin'"
            [class.bg-primary]="user.role !== 'Admin'"
          >
            {{ user.role }}
          </span>
        </td>
        <td>
          <span
            class="badge"
            [class.bg-success]="user.isActive"
            [class.bg-secondary]="!user.isActive"
          >
            {{ user.isActive ? 'Active' : 'Inactive' }}
          </span>
        </td>
        <td>
          <button class="btn btn-sm btn-danger" (click)="deleteUser(user.userId!)">
            🗑️ Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
