<div class="container mt-4">
  <h2 class="mb-4">🛒 Shopping Cart</h2>
  <div class="alert alert-info" *ngIf="message">{{ message }}</div>

  <div *ngIf="cartItems.length > 0; else emptyCart">
    <table class="table table-hover">
      <thead class="table-dark">
        <tr>
          <th>Product</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Subtotal</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of cartItems">
          <td>
            <div class="d-flex align-items-center gap-2">
              <img
                [src]="item.product?.imageUrl || 'assets/images/placeholder.jpg'"
                width="50"
                height="50"
                style="object-fit: cover; border-radius: 6px"
              />
              <strong>{{ item.product?.name }}</strong>
            </div>
          </td>
          <td>₹{{ item.product?.price }}</td>
          <td>
            <div class="d-flex align-items-center gap-2">
              <button class="btn btn-sm btn-outline-secondary" (click)="decreaseQty(item)">
                −
              </button>
              <span class="fw-bold">{{ item.quantity }}</span>
              <button class="btn btn-sm btn-outline-secondary" (click)="increaseQty(item)">
                +
              </button>
            </div>
          </td>
          <td>₹{{ (item.product?.price || 0) * item.quantity }}</td>
          <td>
            <button class="btn btn-danger btn-sm" (click)="removeItem(item)">🗑️</button>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="card mt-3">
      <div class="card-body d-flex justify-content-between align-items-center">
        <h4>
          Total: <strong class="text-success">₹{{ total }}</strong>
        </h4>
        <button class="btn btn-success btn-lg">✅ Checkout</button>
      </div>
    </div>
  </div>

  <ng-template #emptyCart>
    <div class="text-center py-5">
      <h4>Your cart is empty 😔</h4>
      <a routerLink="/products" class="btn btn-dark mt-3">Start Shopping</a>
    </div>
  </ng-template>
</div>
