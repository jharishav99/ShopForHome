<div class="container mt-4" *ngIf="product; else loading">
  <div class="row">
    <div class="col-md-5">
      <img
        [src]="product.imageUrl || 'assets/images/placeholder.jpg'"
        class="img-fluid rounded shadow"
        [alt]="product.name"
      />
    </div>
    <div class="col-md-7">
      <h2>{{ product.name }}</h2>
      <p class="text-muted">{{ product.description }}</p>
      <h3 class="text-success">₹{{ product.price }}</h3>
      <p>⭐ Rating: {{ product.rating || 'N/A' }}</p>
      <p>
        Stock:
        <span
          class="badge"
          [class.bg-success]="product.stock > 10"
          [class.bg-warning]="product.stock <= 10 && product.stock > 0"
          [class.bg-danger]="product.stock === 0"
        >
          {{ product.stock > 0 ? product.stock + ' available' : 'Out of Stock' }}
        </span>
      </p>
      <div class="alert alert-success" *ngIf="message">{{ message }}</div>
      <div class="d-flex gap-3 mt-3">
        <button class="btn btn-dark btn-lg" (click)="addToCart()" [disabled]="product.stock === 0">
          🛒 Add to Cart
        </button>
        <a routerLink="/products" class="btn btn-outline-secondary btn-lg">← Back</a>
      </div>
    </div>
  </div>
</div>
<ng-template #loading>
  <div class="container mt-5 text-center">
    <div class="spinner-border text-dark" role="status"></div>
    <p class="mt-2">Loading product...</p>
  </div>
</ng-template>
