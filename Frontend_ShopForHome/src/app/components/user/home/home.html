<div class="bg-dark text-white py-5">
  <div class="container text-center">
    <h1 class="display-4 fw-bold">Welcome to ShopForHome 🏠</h1>
    <p class="lead">Discover beautiful home décor, furniture & lighting</p>
    <a routerLink="/products" class="btn btn-light btn-lg me-3">Shop Now →</a>
    <a routerLink="/register" class="btn btn-outline-light btn-lg">Join Free</a>
  </div>
</div>

<div class="container mt-5">
  <h3 class="text-center mb-4">✨ Featured Products</h3>
  <div class="row">
    <div class="col-md-3 mb-4" *ngFor="let product of featuredProducts">
      <div class="card h-100 shadow-sm">
        <img
          [src]="product.imageUrl || 'assets/images/placeholder.jpg'"
          class="card-img-top"
          style="height: 180px; object-fit: cover"
          [alt]="product.name"
        />
        <div class="card-body">
          <h6 class="card-title">{{ product.name }}</h6>
          <p class="text-success fw-bold">₹{{ product.price }}</p>
        </div>
        <div class="card-footer">
          <a [routerLink]="['/products', product.productId]" class="btn btn-dark btn-sm w-100">
            View Details
          </a>
        </div>
      </div>
    </div>
  </div>
  <div class="text-center mt-3">
    <a routerLink="/products" class="btn btn-outline-dark btn-lg">View All Products →</a>
  </div>
</div>
