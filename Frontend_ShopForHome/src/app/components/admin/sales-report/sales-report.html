<div class="container mt-4">
  <h2>📊 Sales Report</h2>
  <div class="card mb-4 p-3 bg-light">
    <div class="row g-3 align-items-end">
      <div class="col-md-3">
        <label class="form-label">From Date</label>
        <input type="date" class="form-control" [(ngModel)]="startDate" />
      </div>
      <div class="col-md-3">
        <label class="form-label">To Date</label>
        <input type="date" class="form-control" [(ngModel)]="endDate" />
      </div>
      <div class="col-md-2">
        <button class="btn btn-dark w-100" (click)="filterByDate()">Filter</button>
      </div>
      <div class="col-md-4 text-end">
        <h5 class="mb-0">
          Total: <strong class="text-success">₹{{ totalRevenue | number: '1.2-2' }}</strong>
        </h5>
      </div>
    </div>
  </div>
  <table class="table table-hover shadow">
    <thead class="table-dark">
      <tr>
        <th>Order ID</th>
        <th>Date</th>
        <th>Amount</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of filtered">
        <td>#{{ r.orderId }}</td>
        <td>{{ r.orderDate | date: 'mediumDate' }}</td>
        <td class="text-success fw-bold">₹{{ r.totalAmount }}</td>
      </tr>
    </tbody>
  </table>
</div>
