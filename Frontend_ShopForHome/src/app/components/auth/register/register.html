<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-sm-10">
      <div class="card border-0 shadow">
        <div class="card-body p-4">
          <h4 class="text-center fw-bold mb-4">Create an Account</h4>

          <div class="alert alert-danger py-2" *ngIf="error">{{ error }}</div>
          <div class="alert alert-success py-2" *ngIf="success">{{ success }}</div>

          <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label fw-semibold small">Full Name *</label>
              <input
                type="text"
                class="form-control"
                formControlName="fullName"
                placeholder="Enter your full name"
                [class.is-invalid]="
                  registerForm.get('fullName')?.invalid && registerForm.get('fullName')?.touched
                "
              />
              <div class="invalid-feedback">
                <span *ngIf="registerForm.get('fullName')?.errors?.['required']">
                  Full name is required.
                </span>
                <span *ngIf="registerForm.get('fullName')?.errors?.['minlength']">
                  Name must be at least 3 characters.
                </span>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold small">Email Address *</label>
              <input
                type="email"
                class="form-control"
                formControlName="email"
                placeholder="Enter your email"
                [class.is-invalid]="
                  registerForm.get('email')?.invalid && registerForm.get('email')?.touched
                "
              />
              <div class="invalid-feedback">
                <span *ngIf="registerForm.get('email')?.errors?.['required']">
                  Email is required.
                </span>
                <span *ngIf="registerForm.get('email')?.errors?.['email']">
                  Please enter a valid email address.
                </span>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold small">Password *</label>
              <input
                type="password"
                class="form-control"
                formControlName="passwordHash"
                placeholder="Enter password"
                [class.is-invalid]="
                  registerForm.get('passwordHash')?.invalid &&
                  registerForm.get('passwordHash')?.touched
                "
              />
              <div class="invalid-feedback">
                <span *ngIf="registerForm.get('passwordHash')?.errors?.['required']">
                  Password is required.
                </span>
                <span *ngIf="registerForm.get('passwordHash')?.errors?.['minlength']">
                  Password must be at least 5 characters.
                </span>
              </div>
            </div>

            <button type="submit" class="btn btn-dark w-100" [disabled]="loading">
              {{ loading ? 'Creating Account...' : 'Register' }}
            </button>
          </form>

          <p class="text-center mt-3 mb-0 small">
            Already have an account?
            <a routerLink="/login" class="fw-semibold">Login here</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
